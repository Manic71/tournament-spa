  <body class="bg-slate-50">
    <div id="root">Loading application... If this message stays, open DevTools Console for errors.</div>

    <script>
      // Show runtime errors in-page to help debugging before React mounts
      function showErrorOverlay(message) {
        let el = document.getElementById('error-overlay');
        if (!el) {
          el = document.createElement('div');
          el.id = 'error-overlay';
          Object.assign(el.style, {
            position: 'fixed',
            left: '12px',
            right: '12px',
            top: '12px',
            padding: '12px',
            background: '#fee2e2',
            color: '#7f1d1d',
            border: '1px solid #fca5a5',
            borderRadius: '6px',
            zIndex: 99999,
            fontFamily: 'system-ui, Inter, sans-serif'
          });
          document.body.appendChild(el);
        }
        el.textContent = message;
      }

      window.addEventListener('error', function (e) {
        showErrorOverlay('Runtime error: ' + (e && e.message ? e.message : String(e)));
      });
      window.addEventListener('unhandledrejection', function (e) {
        showErrorOverlay('Unhandled promise rejection: ' + (e && e.reason ? e.reason : String(e)));
      });
    </script>

  </body>
</html>
